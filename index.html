<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery</title>

<style>

/* BACKGROUND IMAGE */
body::before {
content: "";
position: fixed;
top:0; left:0;
width:100%; height:100%;
background: url('Wedding.jpg') no-repeat center center;
background-size: cover;
opacity: 0.30;
z-index: -1;
}

/* GENERAL */
body {
margin:0;
font-family: 'Segoe UI', Arial, sans-serif;
background:#000;
color:#fff;
text-align:center;
}

.container{
max-width:1100px;
margin:0 auto;
padding:40px 20px;
}

h1 {
font-size:32px;
margin-bottom:10px;
}

p {
font-size:18px;
color:#ddd;
}

/* BUTTONS */
button{
border:none;
border-radius:30px;
font-size:16px;
cursor:pointer;
margin:5px;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button:hover{
transform:scale(1.05);
}

.upload-btn{ background:#ff4da6; color:white; padding:14px 28px;}
.upload-btn:hover{ background:#e60084;}

.download-btn{ background:#4da6ff; color:white; padding:14px 24px;}
.download-btn:hover{ background:#0080ff;}

.select-all-btn{ background:#00ff99; color:black; padding:14px 24px;}
.select-all-btn:hover{ background:#00cc7a;}

.deselect-all-btn{ background:#ffcc00; color:black; padding:14px 24px;}
.deselect-all-btn:hover{ background:#e6b800;}

.delete-btn{
background:#ff3333;
color:white;
font-size:13px;
padding:5px 10px;
position:absolute;
bottom:8px;
right:8px;
}

/* DROP AREA */
#drop-area{
border:2px dashed #fff;
padding:30px;
border-radius:20px;
margin:20px 0;
transition:0.3s;
background:rgba(255,255,255,0.05);
}

#drop-area.hover{
background:rgba(255,255,255,0.15);
}

/* CONTROLS */
.controls{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

/* GALLERY */
.gallery{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.gallery-item{
position:relative;
transition:0.3s;
}

.gallery-item img{
width:100%;
border-radius:15px;
cursor:pointer;
opacity:0;
animation:fadeIn 0.6s forwards;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.gallery-item img:hover{
transform:scale(1.03);
}

@keyframes fadeIn{
to{opacity:1;}
}

.checkbox-container{
position:absolute;
top:8px;
left:8px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:6px;
}

.confetti-message{
margin-top:10px;
color:#ff4da6;
font-weight:bold;
font-size:18px;
}

/* MESSAGE BOARD */
.message-board{
margin-top:60px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter: blur(8px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.message-board h2{
margin-bottom:20px;
color:#ffccff;
}

.message-board input,
.message-board textarea{
width:100%;
max-width:600px;
padding:12px;
margin:10px auto;
border-radius:15px;
border:none;
display:block;
font-size:15px;
}

.message-board textarea{
resize:none;
height:100px;
}

.message-board button{
background:#ff66cc;
color:white;
padding:12px 25px;
}

.messages{
margin-top:20px;
}

.single-message{
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:15px;
margin:10px auto;
max-width:600px;
text-align:left;
}

.single-message strong{
color:#ff99dd;
}

</style>
</head>

<body>

<div class="container">

<h1>📸 Zweers Troue Gallery</h1>
<p>Upload jou photos vanaf jou foon of rekenaar! ❤️</p>

<div id="drop-area">
<input type="file" id="fileInput" hidden>
<button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Photo</button>
<p>Of sleep jou foto hierheen</p>
</div>

<div class="controls">
<button class="select-all-btn" id="selectAllBtn">Select All</button>
<button class="deselect-all-btn" id="deselectAllBtn">Deselect All</button>
<button class="download-btn" id="downloadSelectedBtn">Download Selected</button>
</div>

<div class="confetti-message" id="confettiMessage"></div>
<div class="gallery" id="gallery"></div>

<!-- MESSAGE BOARD -->
<div class="message-board">
<h2>💌 Los ’n Boodskap vir die Bruidspaar</h2>

<input type="text" id="nameInput" placeholder="Jou Naam">
<textarea id="messageInput" placeholder="Skryf jou boodskap hier..."></textarea>
<button onclick="addMessage()">Stuur Boodskap</button>

<div class="messages" id="messages"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, uploadBytes, listAll, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const firebaseConfig = {
apiKey: "AIzaSyB_AVP6tZD8U4AHNLrVf9nCe-gpOHPDLM8",
authDomain: "zweers-troue.firebaseapp.com",
projectId: "zweers-troue",
storageBucket: "zweers-troue.firebasestorage.app",
messagingSenderId: "584236352490",
appId: "1:584236352490:web:c717038090bd005e712893"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const adminPassword = "troueAdmin123";

/* UPLOAD */
const input = document.getElementById("fileInput");
const dropArea = document.getElementById("drop-area");

function handleFiles(file){
const storageRef = ref(storage,"photos/"+file.name);
uploadBytes(storageRef,file).then(()=>{
showConfetti();
loadImages();
});
}

input.addEventListener("change",(e)=>{
const file = e.target.files[0];
if(file) handleFiles(file);
});

dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
dropArea.classList.add("hover");
});

dropArea.addEventListener("dragleave",(e)=>{
e.preventDefault();
dropArea.classList.remove("hover");
});

dropArea.addEventListener("drop",(e)=>{
e.preventDefault();
dropArea.classList.remove("hover");
const file = e.dataTransfer.files[0];
if(file) handleFiles(file);
});

/* LOAD GALLERY */
async function loadImages(){
const gallery = document.getElementById("gallery");
gallery.innerHTML="";
const listRef = ref(storage,"photos");
const res = await listAll(listRef);

for(const item of res.items){
const url = await getDownloadURL(item);

const div = document.createElement("div");
div.className="gallery-item";

const img = document.createElement("img");
img.src=url;

const checkbox = document.createElement("input");
checkbox.type="checkbox";
checkbox.className="photo-checkbox";

const checkboxContainer = document.createElement("div");
checkboxContainer.className="checkbox-container";
checkboxContainer.appendChild(checkbox);

const deleteBtn = document.createElement("button");
deleteBtn.className="delete-btn";
deleteBtn.innerText="Delete";
deleteBtn.onclick = async ()=>{
const pass = prompt("Enter admin password to delete:");
if(pass===adminPassword){
await deleteObject(ref(storage,"photos/"+item.name));
loadImages();
}else{
alert("Wrong password!");
}
};

div.appendChild(img);
div.appendChild(checkboxContainer);
div.appendChild(deleteBtn);
gallery.appendChild(div);
}
}

/* BUTTON ACTIONS */
document.getElementById("selectAllBtn").onclick=()=>{
document.querySelectorAll(".photo-checkbox").forEach(cb=>cb.checked=true);
};

document.getElementById("deselectAllBtn").onclick=()=>{
document.querySelectorAll(".photo-checkbox").forEach(cb=>cb.checked=false);
};

document.getElementById("downloadSelectedBtn").onclick=async ()=>{
const selected=[...document.querySelectorAll(".photo-checkbox")].filter(cb=>cb.checked);
if(selected.length===0){alert("Geen foto geselekteer nie!"); return;}

for(const cb of selected){
const img=cb.closest(".gallery-item").querySelector("img");
const response=await fetch(img.src);
const blob=await response.blob();
const blobUrl=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=blobUrl;
a.download=img.src.split("/").pop();
a.click();
URL.revokeObjectURL(blobUrl);
}
};

/* CONFETTI MESSAGE */
function showConfetti(){
const msg=document.getElementById("confettiMessage");
msg.innerText="🎉 Dankie! Jou foto is nou deel van die herinneringe!";
setTimeout(()=>{msg.innerText="";},3000);
}

/* MESSAGE BOARD */
function addMessage(){
const name=document.getElementById("nameInput").value;
const message=document.getElementById("messageInput").value;

if(!name || !message){ alert("Vul asseblief alles in!"); return;}

const msgDiv=document.createElement("div");
msgDiv.className="single-message";
msgDiv.innerHTML=`<strong>${name}</strong><p>${message}</p>`;

document.getElementById("messages").prepend(msgDiv);

document.getElementById("nameInput").value="";
document.getElementById("messageInput").value="";
}

loadImages();

</script>

</body>
</html>
