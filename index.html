<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery</title>

<style>
body::before {
    content: "";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: url('Wedding.jpg') no-repeat center center;
    background-size: cover;
    opacity: 0.25;
    z-index: -1;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container{
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
}

input[type="text"]{
    padding:10px;
    border-radius:20px;
    border:none;
    width:250px;
    text-align:center;
    margin-bottom:10px;
}

button{
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    padding:12px 20px;
    margin:5px;
}

.upload-btn{ background:#ff4da6; color:white; }
.download-btn{ background:#4da6ff; color:white; }
.select-btn{ background:#00ff99; color:black; }
.deselect-btn{ background:#ffcc00; color:black; }
.delete-btn{ background:#ff3333; color:white; font-size:12px; padding:5px 10px; }

.gallery{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
}

.gallery-item{
    position:relative;
}

.gallery-item img{
    width:100%;
    border-radius:15px;
}

.checkbox{
    position:absolute;
    top:8px;
    left:8px;
}

.delete-btn{
    position:absolute;
    bottom:8px;
    right:8px;
}
</style>
</head>
<body>

<div class="container">
    <h1>📸 Zweers Troue Gallery</h1>
    <p>Upload jou fotos ❤️</p>

    <input type="text" id="uploaderName" placeholder="Jou Naam & Van" required><br>

    <input type="file" id="fileInput" hidden>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Photo</button>

    <div>
        <button class="select-btn" id="selectAllBtn">Select All</button>
        <button class="deselect-btn" id="deselectAllBtn">Deselect All</button>
        <button class="download-btn" id="downloadBtn">Download Selected</button>
    </div>

    <div class="gallery" id="gallery"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, uploadBytes, listAll, getDownloadURL, deleteObject } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "zweers-troue.firebaseapp.com",
    projectId: "zweers-troue",
    storageBucket: "zweers-troue.firebasestorage.app",
    messagingSenderId: "584236352490",
    appId: "1:584236352490:web:c717038090bd005e712893"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

const adminPassword = "troueAdmin123";
const downloadPassword = "download123";

const fileInput = document.getElementById("fileInput");
const gallery = document.getElementById("gallery");

// Upload
fileInput.addEventListener("change", async (e)=>{
    const file = e.target.files[0];
    const name = document.getElementById("uploaderName").value.trim();

    if(!file || !name){
        alert("Sit asseblief jou naam in.");
        return;
    }

    const safeName = name.replace(/\s+/g,"_");
    const storageRef = ref(storage, `photos/${safeName}/${file.name}`);
    await uploadBytes(storageRef,file);
    alert("Foto suksesvol opgelaai!");
    loadImages();
});

// Load images grouped by folder
async function loadImages(){
    gallery.innerHTML="";
    const mainRef = ref(storage,"photos");
    const folders = await listAll(mainRef);

    for(const folder of folders.prefixes){
        const files = await listAll(folder);

        for(const file of files.items){
            const url = await getDownloadURL(file);

            const div = document.createElement("div");
            div.className="gallery-item";

            const img = document.createElement("img");
            img.src=url;

            const checkbox = document.createElement("input");
            checkbox.type="checkbox";
            checkbox.className="photoCheck checkbox";
            checkbox.dataset.url = url;

            const deleteBtn = document.createElement("button");
            deleteBtn.innerText="Delete";
            deleteBtn.className="delete-btn";
            deleteBtn.onclick = async ()=>{
                const pass = prompt("Admin password:");
                if(pass===adminPassword){
                    await deleteObject(file);
                    loadImages();
                } else alert("Verkeerde password!");
            }

            div.appendChild(img);
            div.appendChild(checkbox);
            div.appendChild(deleteBtn);
            gallery.appendChild(div);
        }
    }
}

// Select All
document.getElementById("selectAllBtn").onclick = ()=>{
    document.querySelectorAll(".photoCheck").forEach(cb=>cb.checked=true);
};

// Deselect All
document.getElementById("deselectAllBtn").onclick = ()=>{
    document.querySelectorAll(".photoCheck").forEach(cb=>cb.checked=false);
};

// Download Selected
document.getElementById("downloadBtn").onclick = ()=>{
    const pass = prompt("Download password:");
    if(pass!==downloadPassword){
        alert("Verkeerde password!");
        return;
    }

    const selected = document.querySelectorAll(".photoCheck:checked");

    if(selected.length===0){
        alert("Geen fotos geselekteer nie!");
        return;
    }

    selected.forEach(cb=>{
        const a = document.createElement("a");
        a.href = cb.dataset.url;
        a.download = "";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });
};

loadImages();
</script>

</body>
</html>
