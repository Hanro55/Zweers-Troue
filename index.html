<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery</title>

<style>

/* BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:url('Wedding.jpg') no-repeat center center;
background-size:cover;
opacity:0.30;
z-index:-1;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:250px;
background:rgba(0,0,0,0.85);
padding:20px;
transition:0.4s;
z-index:1000;
}

.sidebar.collapsed{
width:70px;
}

.sidebar h3{
color:#ff66cc;
}

.sidebar button{
display:block;
width:100%;
margin:10px 0;
padding:10px;
border:none;
border-radius:20px;
background:#ff4da6;
color:#fff;
cursor:pointer;
}

.toggle-btn{
position:absolute;
top:20px;
right:-15px;
background:#ff4da6;
border-radius:50%;
width:30px;
height:30px;
cursor:pointer;
}

/* MAIN CONTENT */
.main{
margin-left:260px;
padding:40px 20px;
transition:0.4s;
}

.sidebar.collapsed + .main{
margin-left:80px;
}

/* BUTTONS */
button{
border:none;
border-radius:30px;
font-size:15px;
cursor:pointer;
margin:5px;
transition:0.3s;
}

.upload-btn{background:#ff4da6;color:white;padding:14px 28px;}
.download-btn{background:#4da6ff;color:white;padding:14px 24px;}
.select-all-btn{background:#00ff99;color:black;padding:14px 24px;}
.deselect-all-btn{background:#ffcc00;color:black;padding:14px 24px;}

button:hover{transform:scale(1.05);}

/* DROP */
#drop-area{
border:2px dashed #fff;
padding:30px;
border-radius:20px;
margin:20px 0;
background:rgba(255,255,255,0.05);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:30px;
}

.gallery-item{
position:relative;
}

.gallery-item img{
width:100%;
border-radius:15px;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,0.5);
transition:0.3s;
}

.gallery-item img:hover{
transform:scale(1.05);
}

.like-btn{
position:absolute;
bottom:8px;
left:8px;
background:#ff66cc;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* FULLSCREEN */
.fullscreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

.fullscreen img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

/* MESSAGE BOARD */
.message-board{
margin-top:60px;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

.message-board input,
.message-board textarea{
width:100%;
max-width:600px;
margin:10px auto;
padding:10px;
border-radius:15px;
border:none;
display:block;
}

.single-message{
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:15px;
margin:10px auto;
max-width:600px;
}

/* CAROUSEL */
.carousel{
margin-top:50px;
text-align:center;
}

.carousel img{
width:80%;
max-width:500px;
border-radius:20px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div class="toggle-btn" onclick="toggleSidebar()">☰</div>
<h3>Zweers Troue</h3>
<button onclick="startCarousel()">Start Slideshow</button>
<button onclick="stopCarousel()">Stop Slideshow</button>
</div>

<div class="main">

<h1>📸 Zweers Troue Gallery</h1>

<div id="drop-area">
<input type="file" id="fileInput" hidden>
<button class="upload-btn" onclick="fileInput.click()">Upload Photo</button>
<p>Of sleep jou foto hierheen</p>
</div>

<div>
<button class="select-all-btn" id="selectAllBtn">Select All</button>
<button class="deselect-all-btn" id="deselectAllBtn">Deselect All</button>
<button class="download-btn" id="downloadSelectedBtn">Download Selected</button>
</div>

<div class="gallery" id="gallery"></div>

<div class="carousel">
<h2>🎞️ Troue Slideshow</h2>
<img id="carouselImage">
</div>

<div class="message-board">
<h2>💌 Los ’n Boodskap</h2>
<input type="text" id="nameInput" placeholder="Jou Naam">
<textarea id="messageInput" placeholder="Jou boodskap"></textarea>
<button onclick="addMessage()">Stuur</button>
<div id="messages"></div>
</div>

</div>

<div class="fullscreen" id="fullscreen" onclick="closeFullscreen()">
<img id="fullscreenImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, uploadBytes, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { getDatabase, ref as dbRef, push, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyB...",
authDomain:"zweers-troue.firebaseapp.com",
databaseURL:"https://zweers-troue-default-rtdb.firebaseio.com/",
projectId:"zweers-troue",
storageBucket:"zweers-troue.firebasestorage.app"
};

const app=initializeApp(firebaseConfig);
const storage=getStorage(app);
const database=getDatabase(app);

const gallery=document.getElementById("gallery");
let imageList=[];
let carouselInterval;

/* LOAD IMAGES */
async function loadImages(){
gallery.innerHTML="";
const res=await listAll(ref(storage,"photos"));
imageList=[];
for(const item of res.items){
const url=await getDownloadURL(item);
imageList.push(url);

const div=document.createElement("div");
div.className="gallery-item";

const img=document.createElement("img");
img.src=url;
img.onclick=()=>openFullscreen(url);

const like=document.createElement("button");
like.className="like-btn";
like.innerText="❤️ Like";

div.appendChild(img);
div.appendChild(like);
gallery.appendChild(div);
}
document.getElementById("carouselImage").src=imageList[0];
}
loadImages();

/* FULLSCREEN */
function openFullscreen(src){
document.getElementById("fullscreenImg").src=src;
document.getElementById("fullscreen").style.display="flex";
}
function closeFullscreen(){
document.getElementById("fullscreen").style.display="none";
}

/* SIDEBAR */
window.toggleSidebar=function(){
document.getElementById("sidebar").classList.toggle("collapsed");
}

/* CAROUSEL */
window.startCarousel=function(){
let i=0;
carouselInterval=setInterval(()=>{
i=(i+1)%imageList.length;
document.getElementById("carouselImage").src=imageList[i];
},3000);
}
window.stopCarousel=function(){
clearInterval(carouselInterval);
}

/* MESSAGE BOARD FIREBASE */
window.addMessage=function(){
const name=document.getElementById("nameInput").value;
const message=document.getElementById("messageInput").value;
if(!name||!message)return alert("Vul alles in!");
push(dbRef(database,"messages"),{name,message});
document.getElementById("nameInput").value="";
document.getElementById("messageInput").value="";
}

onValue(dbRef(database,"messages"),snapshot=>{
const data=snapshot.val();
const container=document.getElementById("messages");
container.innerHTML="";
for(let id in data){
const div=document.createElement("div");
div.className="single-message";
div.innerHTML=`<strong>${data[id].name}</strong><p>${data[id].message}</p>`;
container.prepend(div);
}
});

</script>

</body>
</html>
