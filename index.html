<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:white;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    height:100%;
    width:220px;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:20px;
}
.sidebar h2{
    text-align:center;
}
.sidebar button{
    width:100%;
    margin:10px 0;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:20px;
}

/* CAROUSEL */
.carousel{
    position:relative;
    height:300px;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:30px;
}
.carousel img{
    width:100%;
    height:300px;
    object-fit:cover;
}

/* UPLOAD */
.upload-box{
    margin:20px 0;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:15px;
    position:relative;
}
.card img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
}
.like{
    cursor:pointer;
    color:#ff4da6;
}
.stats{
    margin:20px 0;
    font-size:18px;
}
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.lightbox img{
    max-width:90%;
    max-height:90%;
}
</style>
</head>
<body>

<div class="sidebar">
    <h2>💍 Zweers Troue</h2>
    <button onclick="filterBy('all')">Alle Fotos</button>
    <div id="userFilters"></div>
</div>

<div class="main">

<h1>📸 Troue Herinneringe</h1>

<div class="stats" id="stats"></div>

<div class="carousel">
    <img id="carouselImage">
</div>

<div class="upload-box">
    <input type="file" id="fileInput">
    <button onclick="uploadPhoto()">Upload</button>
</div>

<div class="gallery" id="gallery"></div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, uploadBytes, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR KEY",
    authDomain: "YOUR DOMAIN",
    projectId: "zweers-troue",
    storageBucket: "zweers-troue.firebasestorage.app",
    messagingSenderId: "584236352490",
    appId: "1:584236352490:web:c717038090bd005e712893"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

let photos = [];
let currentFilter = "all";

/* UPLOAD */
async function uploadPhoto(){
    const file = document.getElementById("fileInput").files[0];
    if(!file) return;

    const name = prompt("Wat is jou naam?");
    const message = prompt("Los 'n boodskap vir die bruid en bruidegom:");

    const storageRef = ref(storage, "photos/"+Date.now()+"_"+file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db,"photos"),{
        url:url,
        name:name,
        message:message,
        likes:0
    });

    loadPhotos();
}

/* LOAD */
async function loadPhotos(){
    const snapshot = await getDocs(collection(db,"photos"));
    photos=[];
    snapshot.forEach(doc=>{
        photos.push({id:doc.id,...doc.data()});
    });

    renderGallery();
    renderStats();
    renderCarousel();
    renderUserFilters();
}

function renderGallery(){
    const gallery = document.getElementById("gallery");
    gallery.innerHTML="";

    photos.filter(p=> currentFilter==="all" || p.name===currentFilter)
    .forEach(photo=>{
        const div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <img src="${photo.url}" onclick="openLightbox('${photo.url}')">
            <p><strong>${photo.name}</strong></p>
            <p>${photo.message}</p>
            <p class="like" onclick="likePhoto('${photo.id}',${photo.likes})">❤️ ${photo.likes}</p>
        `;

        gallery.appendChild(div);
    });
}

function renderStats(){
    const total = photos.length;
    const users = [...new Set(photos.map(p=>p.name))].length;
    document.getElementById("stats").innerText =
        `📸 ${total} Fotos | 👥 ${users} Gaste het opgelaai`;
}

function renderCarousel(){
    if(photos.length===0) return;
    let index=0;
    const img = document.getElementById("carouselImage");
    img.src = photos[0].url;
    setInterval(()=>{
        index=(index+1)%photos.length;
        img.src = photos[index].url;
    },3000);
}

function renderUserFilters(){
    const container = document.getElementById("userFilters");
    const names=[...new Set(photos.map(p=>p.name))];
    container.innerHTML="";
    names.forEach(name=>{
        const btn=document.createElement("button");
        btn.innerText=name;
        btn.onclick=()=>filterBy(name);
        container.appendChild(btn);
    });
}

window.filterBy = function(name){
    currentFilter=name;
    renderGallery();
}

window.likePhoto = async function(id,currentLikes){
    const photoRef = doc(db,"photos",id);
    await updateDoc(photoRef,{likes:currentLikes+1});
    loadPhotos();
}

window.openLightbox = function(url){
    document.getElementById("lightboxImg").src=url;
    document.getElementById("lightbox").style.display="flex";
}
window.closeLightbox = function(){
    document.getElementById("lightbox").style.display="none";
}

loadPhotos();

</script>
</body>
</html>
