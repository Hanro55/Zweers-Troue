<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery</title>

<style>

/* FADED BACKGROUND */
body::before {
    content: "";
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: url('Wedding.jpg') no-repeat center center;
    background-size: cover;
    opacity: 0.30;
    z-index: -1;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
}

.container{
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
}

/* CAROUSEL */
.carousel{
    width:100%;
    height:250px;
    overflow:hidden;
    border-radius:20px;
    margin-bottom:30px;
}
.carousel img{
    width:100%;
    height:250px;
    object-fit:cover;
}

/* BUTTONS */
button{
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
    transition:0.3s;
}

.upload-btn{ background:#ff4da6; color:white; padding:15px 30px;}
.upload-btn:hover{ background:#e60084;}

.like-btn{ background:transparent; color:#ff4da6; font-weight:bold;}

.filter-btn{ background:#4da6ff; color:white; padding:10px 20px;}
.filter-btn:hover{ background:#0080ff;}

#drop-area {
    border: 2px dashed #fff;
    padding: 20px;
    border-radius: 20px;
    margin: 20px 0;
}

/* GALLERY */
.gallery{
    margin-top:40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
}

.card{
    background: rgba(255,255,255,0.08);
    padding:10px;
    border-radius:15px;
}

.card img{
    width:100%;
    border-radius:15px;
    cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

.stats{
    margin:20px 0;
    font-size:18px;
    color:#ff4da6;
}

.confetti-message{
    margin-top:10px;
    color:#ff4da6;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="container">

<h1>📸 Zweers Troue Gallery</h1>
<p>Upload jou photos en los 'n boodskap ❤️</p>

<div class="stats" id="stats"></div>

<div class="carousel">
    <img id="carouselImage">
</div>

<div id="drop-area">
    <input type="file" id="fileInput" hidden>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Photo</button>
    <p>Of sleep jou foto hierheen</p>
</div>

<div id="userFilters"></div>

<div class="confetti-message" id="confettiMessage"></div>

<div class="gallery" id="gallery"></div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightboxImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "JOU KEY HIER",
    authDomain: "zweers-troue.firebaseapp.com",
    projectId: "zweers-troue",
    storageBucket: "zweers-troue.firebasestorage.app",
    messagingSenderId: "584236352490",
    appId: "1:584236352490:web:c717038090bd005e712893"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

let photos=[];
let currentFilter="all";

/* UPLOAD */
document.getElementById("fileInput").addEventListener("change", async (e)=>{
    const file=e.target.files[0];
    if(!file) return;

    const name=prompt("Wat is jou naam?");
    const message=prompt("Los 'n boodskap:");

    const storageRef=ref(storage,"photos/"+Date.now()+"_"+file.name);
    await uploadBytes(storageRef,file);
    const url=await getDownloadURL(storageRef);

    await addDoc(collection(db,"photos"),{
        url:url,
        name:name,
        message:message,
        likes:0
    });

    showConfetti();
    loadPhotos();
});

/* LOAD */
async function loadPhotos(){
    const snapshot=await getDocs(collection(db,"photos"));
    photos=[];
    snapshot.forEach(doc=>{
        photos.push({id:doc.id,...doc.data()});
    });

    renderGallery();
    renderStats();
    renderCarousel();
    renderFilters();
}

function renderGallery(){
    const gallery=document.getElementById("gallery");
    gallery.innerHTML="";

    photos.filter(p=>currentFilter==="all"||p.name===currentFilter)
    .forEach(photo=>{
        const div=document.createElement("div");
        div.className="card";
        div.innerHTML=`
            <img src="${photo.url}" onclick="openLightbox('${photo.url}')">
            <p><strong>${photo.name}</strong></p>
            <p>${photo.message}</p>
            <button class="like-btn" onclick="likePhoto('${photo.id}',${photo.likes})">❤️ ${photo.likes}</button>
        `;
        gallery.appendChild(div);
    });
}

function renderStats(){
    const total=photos.length;
    const users=[...new Set(photos.map(p=>p.name))].length;
    document.getElementById("stats").innerText=
    `📸 ${total} Fotos | 👥 ${users} Gaste`;
}

function renderCarousel(){
    if(photos.length===0) return;
    let index=0;
    const img=document.getElementById("carouselImage");
    img.src=photos[0].url;
    setInterval(()=>{
        index=(index+1)%photos.length;
        img.src=photos[index].url;
    },4000);
}

function renderFilters(){
    const container=document.getElementById("userFilters");
    const names=[...new Set(photos.map(p=>p.name))];
    container.innerHTML='<button class="filter-btn" onclick="filterBy(\'all\')">Alle Fotos</button>';
    names.forEach(name=>{
        container.innerHTML+=`<button class="filter-btn" onclick="filterBy('${name}')">${name}</button>`;
    });
}

window.filterBy=function(name){
    currentFilter=name;
    renderGallery();
}

window.likePhoto=async function(id,currentLikes){
    const photoRef=doc(db,"photos",id);
    await updateDoc(photoRef,{likes:currentLikes+1});
    loadPhotos();
}

window.openLightbox=function(url){
    document.getElementById("lightboxImg").src=url;
    document.getElementById("lightbox").style.display="flex";
}
window.closeLightbox=function(){
    document.getElementById("lightbox").style.display="none";
}

function showConfetti(){
    const msg=document.getElementById("confettiMessage");
    msg.innerText="🎉 Dankie! Jou foto is nou deel van die herinneringe!";
    setTimeout(()=>{msg.innerText="";},3000);
}

loadPhotos();

</script>
</body>
</html>
