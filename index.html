<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body::before{
    content:"";
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:url('Wedding.jpg') no-repeat center center;
    background-size:cover; opacity:0.3; z-index:-1;
}
body{margin:0; font-family:'Poppins', sans-serif; background:#000; color:#fff;}
.container{max-width:1000px;margin:0 auto;padding:20px;}
h1{text-align:center;font-size:32px;color:#fff;}
p{text-align:center;font-size:18px;color:#ccc;}
button{border:none;border-radius:30px;font-size:16px;cursor:pointer;margin:5px;transition:0.3s;}
.upload-btn{background:#ff4da6;color:white;padding:12px 25px;}
.upload-btn:hover{background:#e60084;}
.download-btn{background:#4da6ff;color:white;padding:12px 20px;}
.select-all-btn{background:#00ff99;color:black;padding:12px 20px;}
.deselect-all-btn{background:#ffcc00;color:black;padding:12px 20px;}
.delete-btn{background:#ff3333;color:white;font-size:14px;padding:5px 10px;}

#drop-area{border:2px dashed #fff;padding:20px;border-radius:20px;margin:20px 0;text-align:center;}
.controls{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}
.gallery{display:block;margin-top:20px;}
.gallery-item{position:relative;background:rgba(255,255,255,0.05);border-radius:10px;overflow:hidden;}
.gallery-item img{width:100%;border-radius:10px;cursor:pointer;opacity:0;animation:fadeIn 0.5s forwards;}
@keyframes fadeIn{to{opacity:1;}}

.user-section{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
}

.user-heading{
    margin-top:40px;
    font-size:24px;
    font-weight:700;
    color:#ff4da6;
    border-bottom:2px solid rgba(255,255,255,0.2);
    padding-bottom:5px;
}

.carousel{position:relative;width:100%;max-height:300px;margin-bottom:20px;overflow:hidden;border-radius:10px;}
.carousel img{width:100%;height:300px;object-fit:cover;}
.carousel-caption{position:absolute;bottom:10px;left:10px;color:#fff;font-size:20px;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;}

.sidebar{position:fixed;left:0;top:0;height:100%;width:220px;background:rgba(0,0,0,0.9);color:#fff;overflow-x:hidden;transition:width 0.3s;padding-top:60px;z-index:1000;}
.sidebar.collapsed{width:0;padding:0;}
.sidebar a{display:block;padding:10px 20px;text-decoration:none;color:white;}
.sidebar a:hover{background:#111;}
#sidebarToggle{position:fixed;left:10px;top:15px;background:#ff4da6;border-radius:50%;width:40px;height:40px;border:none;color:#fff;font-size:24px;z-index:1100;}

#searchContainer{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-bottom:15px;
}

#searchBar{
    width:250px;
    padding:8px 12px;
    border-radius:20px;
    border:none;
    font-size:16px;
}

#searchBtn{
    background:#ff4da6;
    color:white;
    padding:8px 15px;
}

.stats{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin:15px auto;font-size:14px;}
.stat-card{background:rgba(255,255,255,0.1); padding:15px; border-radius:12px; text-align:center; min-width:120px;}

#lightboxOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:2000;}
#lightboxOverlay img{max-width:90%;max-height:90%;border-radius:10px;}
#lightboxOverlay span{position:absolute;top:20px;right:30px;font-size:30px;color:white;cursor:pointer;}

.memorial{
    margin-top:60px;
    text-align:center;
}

.memorial textarea{
    width:90%;
    max-width:400px;
    height:80px;
    border-radius:15px;
    padding:10px;
}

.message-card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin:15px auto;
    max-width:500px;
}
</style>
</head>
<body>

<div class="sidebar collapsed" id="sidebar">
    <a href="#" data-category="all">Alle Fotos</a>
    <a href="#" data-category="family">Familie</a>
    <a href="#" data-category="bride">Bride</a>
    <a href="#" data-category="groom">Groom</a>
    <a href="#" data-category="friends">Friends</a>
    <a href="#" data-category="other">Other</a>
    <a href="#" data-category="my">My Fotos</a>
    <a href="#" id="adminBtn">🔐 Admin</a>
</div>
<button id="sidebarToggle">☰</button>

<div class="carousel" id="heroCarousel">
    <div class="carousel-caption">Zweers Troue 2026 ❤️</div>
</div>

<div class="container">
    <h1>📸 Zweers Troue Gallery</h1>

    <div id="searchContainer">
        <input id="searchBar" placeholder="🔍 Soek naam...">
        <button id="searchBtn">Soek</button>
    </div>

    <div class="stats" id="stats"></div>
    <div class="gallery" id="gallery"></div>

    <!-- Memorial Section -->
    <div class="memorial">
        <h2>💌 Los 'n boodskap vir die bruidspaar</h2>
        <input type="text" id="msgName" placeholder="Jou Naam"><br><br>
        <textarea id="msgText" placeholder="Jou boodskap..."></textarea><br><br>
        <button class="upload-btn" id="sendMsgBtn">Stuur Boodskap</button>
        <div id="messagesList"></div>
    </div>
</div>

<div id="lightboxOverlay">
    <span id="closeLightbox">&times;</span>
    <img id="lightboxImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getStorage, ref, listAll, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = { /* jou config bly dieselfde */ };
const app = initializeApp(firebaseConfig);
const storage = getStorage(app);
const db = getFirestore(app);

const gallery = document.getElementById("gallery");
const searchBar = document.getElementById("searchBar");
const heroCarousel = document.getElementById("heroCarousel");

let carouselImages=[];
let currentSlide=0;
let currentFilter="all";

/* SEARCH BUTTON */
document.getElementById("searchBtn").addEventListener("click",()=>{
    loadImages(currentFilter, searchBar.value);
});

/* REMOVE LIVE SEARCH */

/* SWIPE SUPPORT */
let startX=0;
heroCarousel.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
heroCarousel.addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;
    if(startX-endX>50){currentSlide=(currentSlide+1)%carouselImages.length;}
    if(endX-startX>50){currentSlide=(currentSlide-1+carouselImages.length)%carouselImages.length;}
    updateCarousel();
});

function updateCarousel(){
    heroCarousel.querySelectorAll("img").forEach(e=>e.remove());
    if(carouselImages.length===0) return;
    const img=document.createElement("img");
    img.src=carouselImages[currentSlide].url;
    heroCarousel.appendChild(img);
    currentSlide=(currentSlide+1)%carouselImages.length;
}

setInterval(updateCarousel,5000);

/* MEMORIAL */
document.getElementById("sendMsgBtn").addEventListener("click",async()=>{
    const name=document.getElementById("msgName").value;
    const text=document.getElementById("msgText").value;
    if(!name||!text) return alert("Vul alles in.");
    await addDoc(collection(db,"messages"),{name,text,created:Date.now()});
    loadMessages();
});

async function loadMessages(){
    const q=query(collection(db,"messages"),orderBy("created","desc"));
    const snapshot=await getDocs(q);
    const container=document.getElementById("messagesList");
    container.innerHTML="";
    snapshot.forEach(doc=>{
        const data=doc.data();
        const div=document.createElement("div");
        div.className="message-card";
        div.innerHTML=`<strong>${data.name}</strong><p>${data.text}</p>`;
        container.appendChild(div);
    });
}

loadMessages();
</script>
</body>
</html>
